# ══════════════════════════════════════════════════════════════════════
#   GMotors — Producción (Render + Supabase PostgreSQL)
#   NUNCA usa H2. Si DB_URL no está configurada, falla rápido con error
#   claro en vez de arrancar con datos efímeros.
# ══════════════════════════════════════════════════════════════════════

# ─── Base de datos — Supabase PostgreSQL OBLIGATORIO ──────────────────────────
# DB_URL debe ser jdbc:postgresql://... configurado en Render Environment
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# update: crea tablas nuevas si no existen, NO borra datos existentes.
# Cambiar a 'validate' una vez el esquema esté estable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── Pool optimizado para Supabase + free tier 512MB ─────────────────────────
# Supabase free: máx 60 conexiones. Render free: 1 instancia.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# keepalive: evita que Supabase cierre conexiones inactivas
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ─── SSL requerido por Supabase ───────────────────────────────────────────────
spring.datasource.hikari.data-source-properties.sslmode=require

# ─── UDP deshabilitado ────────────────────────────────────────────────────────
udp.broadcast.enabled=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
token.expiration.minutes=${JWT_EXPIRATION_MINUTES:120}
jwt.secret=${JWT_SECRET:fJ8yX9mL4pQ2vT7sA1bK3rN6eP4cZ8hW0tD9uR5yM2fL8oQ9wE7rB3kU6nH5jC2_CHANGE_ME}

# ─── CORS ────────────────────────────────────────────────────────────────────
cors.allowed-origins=${ALLOWED_ORIGINS:https://gorila-motos.vercel.app,https://gmotors-frontend.vercel.app}

