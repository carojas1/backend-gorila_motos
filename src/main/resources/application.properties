spring.application.name=GMotors

# ─── Base de datos (H2 local por defecto) ────────────────────────────────────
# Producción con Supabase → SPRING_PROFILES_ACTIVE=prod
spring.datasource.url=${DB_URL:jdbc:h2:file:./gmotors_db;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DB_DDL:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ─── UDP Broadcast (deshabilitado) ────────────────────────────────────────────
udp.broadcast.enabled=false

# ─── Servidor ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── JWT ──────────────────────────────────────────────────────────────────────
token.expiration.minutes=${JWT_EXPIRATION_MINUTES:60}

# ─── Email (Resend API) ───────────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:noreply@gorilamoto.com}

# ─── Supabase Storage ─────────────────────────────────────────────────────────
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_BUCKET:gmotors}

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${APP_ENV:development}
management.endpoints.web.base-path=/actuator

# ─── Reportes internos ────────────────────────────────────────────────────────
metrics.reports.output-dir=./metrics-reports/incremental
metrics.reports.timezone=America/Guayaquil
metrics.reports.cron-midday=0 0 12 * * ?
metrics.reports.cron-afternoon=0 0 16 * * ?

# ─── GitLab (opcional, métricas internas) ─────────────────────────────────────
gitlab.enabled=${GITLAB_ENABLED:false}
gitlab.token=${GITLAB_TOKEN:}
gitlab.project-id=${GITLAB_PROJECT_ID:}
gitlab.base-url=https://gitlab.com
gitlab.branch=main
