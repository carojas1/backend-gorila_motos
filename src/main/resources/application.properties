spring.application.name=GMotors

# ─── Base de datos (H2 local por defecto) ────────────────────────────────────
# Producción con Supabase → SPRING_PROFILES_ACTIVE=prod
spring.datasource.url=${DB_URL:jdbc:h2:file:./gmotors_db;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DB_DDL:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ─── UDP Broadcast (deshabilitado) ────────────────────────────────────────────
udp.broadcast.enabled=false

# ─── Servidor ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── JWT ──────────────────────────────────────────────────────────────────────
token.expiration.minutes=${JWT_EXPIRATION_MINUTES:10080}
# Secret leído desde env var JWT_SECRET. En producción (Render), configurar con string ≥64 chars.
jwt.secret=${JWT_SECRET:fJ8yX9mL4pQ2vT7sA1bK3rN6eP4cZ8hW0tD9uR5yM2fL8oQ9wE7rB3kU6nH5jC2}

# ─── Email (Resend API) ───────────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:noreply@gorilamoto.com}

# ─── Email por SMTP (Gmail) — alternativa SIN dominio propio ───────────────────
# Si MAIL_USERNAME + MAIL_PASSWORD están configurados, se usa Gmail SMTP (envía a
# cualquier correo). Si no, se usa Resend. MAIL_PASSWORD = "contraseña de aplicación"
# de Google (16 letras), NO la contraseña normal de la cuenta.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# Nombre visible del remitente
mail.from-name=${MAIL_FROM_NAME:Gorila Motos}

# ─── Supabase Storage ─────────────────────────────────────────────────────────
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_BUCKET:motores}

# ─── Jackson — fechas como ISO strings (LocalDate → "2026-06-08", no array) ──
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${APP_ENV:development}
management.endpoints.web.base-path=/actuator

# ─── Reportes internos ────────────────────────────────────────────────────────
metrics.reports.output-dir=./metrics-reports/incremental
metrics.reports.timezone=America/Guayaquil
metrics.reports.cron-midday=0 0 12 * * ?
metrics.reports.cron-afternoon=0 0 16 * * ?

# ─── GitLab (opcional, métricas internas) ─────────────────────────────────────
gitlab.enabled=${GITLAB_ENABLED:false}
gitlab.token=${GITLAB_TOKEN:}
gitlab.project-id=${GITLAB_PROJECT_ID:}
gitlab.base-url=https://gitlab.com
gitlab.branch=main
